<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Actionsの実行環境</title>
  <desc id="desc">学生PC、GitHub、GitHub Actions runner、Gemini API、PRコメントの順に処理が進む横長のフロー図。</desc>
  <defs>
    <filter id="cardShadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="5" dy="7" stdDeviation="0" flood-color="#314b36" flood-opacity=".07"/>
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#473618" flood-opacity=".09"/>
    </filter>
    <pattern id="grain" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="7" r="1.1" fill="#d7c39f" opacity=".20"/>
      <circle cx="26" cy="17" r="1" fill="#9fb28a" opacity=".14"/>
      <circle cx="15" cy="29" r=".9" fill="#a96d3a" opacity=".12"/>
    </pattern>
  </defs>

  <rect width="1600" height="620" fill="#f4ead8"/>
  <rect width="1600" height="620" fill="url(#grain)" opacity=".72"/>
  <rect x="8" y="8" width="1584" height="604" rx="34" fill="none" stroke="#d7c39f" stroke-width="4"/>
  <circle cx="122" cy="92" r="150" fill="#9fb28a" opacity=".16"/>
  <circle cx="1458" cy="90" r="180" fill="#d9b779" opacity=".20"/>

  <rect x="64" y="52" width="462" height="78" rx="16" fill="#314b36"/>
  <text x="96" y="101" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="900" fill="#fff8e9">GitHub Actions の実行環境</text>
  <text x="66" y="172" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#6d715d">Ubuntuは自分で用意しません。GitHub側のrunnerでPythonが動きます。</text>

  <g transform="translate(70 248)">
    <g filter="url(#cardShadow)">
      <rect width="230" height="282" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
    </g>
    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">1</text>
    <text x="78" y="51" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="900" fill="#29372c">学生PC</text>
    <rect x="38" y="103" width="154" height="96" rx="18" fill="#edf2df" stroke="#9fb28a" stroke-width="3"/>
    <rect x="62" y="123" width="106" height="58" rx="7" fill="#314b36"/>
    <rect x="79" y="183" width="72" height="10" rx="5" fill="#9fb28a"/>
    <path d="M78 144 h52 M78 162 h74" stroke="#fff8e9" stroke-width="6" stroke-linecap="round" opacity=".85"/>
    <text x="115" y="235" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">コードを書く</text>
    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">push / PR作成</text>
  </g>

  <text x="335" y="398" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".70">▶</text>

  <g transform="translate(371 248)">
    <g filter="url(#cardShadow)">
      <rect width="230" height="282" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
    </g>
    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">2</text>
    <text x="78" y="51" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="900" fill="#29372c">GitHub</text>
    <circle cx="115" cy="149" r="50" fill="#efe5cf" stroke="#d9b779" stroke-width="3"/>
    <path d="M85 143 h60 M115 113 v72 M86 164 h58" stroke="#314b36" stroke-width="8" stroke-linecap="round" opacity=".82"/>
    <text x="115" y="235" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">PRイベントを</text>
    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">検知する</text>
  </g>

  <text x="636" y="398" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".70">▶</text>

  <g transform="translate(672 248)">
    <g filter="url(#cardShadow)">
      <rect width="230" height="282" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
    </g>
    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">3</text>
    <text x="78" y="42" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="900" fill="#29372c">Actions</text>
    <text x="78" y="70" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="900" fill="#29372c">runner</text>
    <rect x="34" y="103" width="162" height="96" rx="18" fill="#26382b" stroke="#314b36" stroke-width="3"/>
    <text x="115" y="137" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="800" fill="#fff8e9">ubuntu</text>
    <text x="115" y="168" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="800" fill="#d9b779">python run</text>
    <text x="115" y="235" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">一時環境を用意し</text>
    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">Pythonを実行</text>
  </g>

  <text x="937" y="398" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".70">▶</text>

  <g transform="translate(973 248)">
    <g filter="url(#cardShadow)">
      <rect width="230" height="282" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
    </g>
    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">4</text>
    <text x="78" y="42" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="900" fill="#29372c">Gemini</text>
    <text x="78" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="900" fill="#29372c">API</text>
    <rect x="47" y="104" width="136" height="88" rx="20" fill="#edf2df" stroke="#9fb28a" stroke-width="3"/>
    <rect x="69" y="126" width="92" height="42" rx="12" fill="#314b36"/>
    <text x="115" y="154" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="900" fill="#fff8e9">API</text>
    <path d="M54 121 l7 12 12 7-12 7-7 12-7-12-12-7 12-7Z" fill="#d9b779" opacity=".85"/>
    <path d="M178 169 l5 9 9 5-9 5-5 9-5-9-9-5 9-5Z" fill="#d9b779" opacity=".72"/>
    <text x="115" y="235" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">レビュー文を</text>
    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">生成する</text>
  </g>

  <text x="1238" y="398" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".70">▶</text>

  <g transform="translate(1274 248)">
    <g filter="url(#cardShadow)">
      <rect width="230" height="282" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
    </g>
    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">5</text>
    <text x="78" y="42" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="900" fill="#29372c">PR</text>
    <text x="78" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="900" fill="#29372c">コメント</text>
    <path d="M42 105 h146a18 18 0 0 1 18 18v51a18 18 0 0 1-18 18H90l-36 23 10-23H42a18 18 0 0 1-18-18v-51a18 18 0 0 1 18-18Z" fill="#edf2df" stroke="#9fb28a" stroke-width="3"/>
    <path d="M64 139 h102 M64 163 h78" stroke="#314b36" stroke-width="7" stroke-linecap="round" opacity=".76"/>
    <text x="115" y="235" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">結果をPRに</text>
    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">投稿する</text>
  </g>
</svg>
