<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Actionsで使う3つのファイルの関係図</title>
  <desc id="desc">Pull Request、ai-review.yml、ai_review.py、review_policy.md、Gemini API、PRコメントの関係図。</desc>
  <defs>
    <filter id="cardShadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="5" dy="7" stdDeviation="0" flood-color="#314b36" flood-opacity=".07"/>
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#473618" flood-opacity=".09"/>
    </filter>
    <pattern id="grain" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="7" r="1.1" fill="#d7c39f" opacity=".20"/>
      <circle cx="26" cy="17" r="1" fill="#9fb28a" opacity=".14"/>
      <circle cx="15" cy="29" r=".9" fill="#a96d3a" opacity=".12"/>
    </pattern>
  </defs>

  <rect width="1600" height="620" fill="#f4ead8"/>
  <rect width="1600" height="620" fill="url(#grain)" opacity=".72"/>
  <rect x="8" y="8" width="1584" height="604" rx="34" fill="none" stroke="#d7c39f" stroke-width="4"/>
  <circle cx="118" cy="92" r="150" fill="#9fb28a" opacity=".16"/>
  <circle cx="1458" cy="90" r="180" fill="#d9b779" opacity=".20"/>

  <rect x="64" y="52" width="704" height="78" rx="16" fill="#314b36"/>
  <text x="96" y="101" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="900" fill="#fff8e9">GitHub Actionsで使う3つのファイル</text>
  <text x="66" y="172" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#6d715d">workflowがPythonを実行し、Pythonがレビュー条件を読み込んでAIレビューを投稿します。</text>

  <rect x="318" y="196" width="678" height="340" rx="34" fill="#dce8cf" opacity=".68"/>
  <text x="350" y="224" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="900" fill="#4f6f52">GitHub Actions が動かす範囲</text>

  <g filter="url(#cardShadow)">
    <rect x="64" y="270" width="198" height="224" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
  </g>
  <text x="92" y="310" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="900" fill="#4f6f52">START</text>
  <circle cx="163" cy="368" r="42" fill="#edf2df" stroke="#9fb28a" stroke-width="3"/>
  <text x="163" y="378" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="900" fill="#314b36">PR</text>
  <text x="163" y="442" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="900" fill="#29372c">Pull Request</text>
  <text x="163" y="468" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800" fill="#6d715d">PR作成やpush</text>

  <text x="302" y="390" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".66">▶</text>

  <g filter="url(#cardShadow)">
    <rect x="342" y="270" width="230" height="224" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
  </g>
  <text x="370" y="310" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="900" fill="#4f6f52">WORKFLOW</text>
  <rect x="374" y="338" width="166" height="42" rx="12" fill="#314b36"/>
  <text x="457" y="366" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="900" fill="#fff8e9">ai-review.yml</text>
  <text x="457" y="426" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="900" fill="#29372c">いつ動くかを決める</text>
  <text x="457" y="454" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800" fill="#6d715d">Pythonを実行</text>

  <text x="612" y="390" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".66">▶</text>

  <g filter="url(#cardShadow)">
    <rect x="650" y="250" width="318" height="264" rx="28" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
  </g>
  <text x="684" y="292" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="900" fill="#4f6f52">AIレビュー処理</text>
  <rect x="698" y="318" width="222" height="48" rx="13" fill="#26382b"/>
  <text x="809" y="349" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="900" fill="#fff8e9">ai_review.py</text>
  <text x="809" y="392" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="900" fill="#a96d3a" opacity=".82">▼</text>
  <text x="840" y="394" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="900" fill="#a96d3a">読み込む</text>
  <rect x="692" y="418" width="234" height="50" rx="15" fill="#edf2df" stroke="#9fb28a" stroke-width="3"/>
  <text x="809" y="449" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="900" fill="#314b36">review_policy.md</text>
  <text x="809" y="494" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800" fill="#6d715d">レビュー条件を使う</text>

  <text x="1008" y="390" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".66">▶</text>

  <g filter="url(#cardShadow)">
    <rect x="1048" y="270" width="218" height="224" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
  </g>
  <text x="1078" y="310" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="900" fill="#4f6f52">GENERATE</text>
  <rect x="1097" y="338" width="120" height="48" rx="14" fill="#314b36"/>
  <text x="1157" y="370" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="900" fill="#fff8e9">API</text>
  <path d="M1080 348 l6 10 10 6-10 6-6 10-6-10-10-6 10-6Z" fill="#d9b779" opacity=".78"/>
  <path d="M1236 392 l5 8 8 5-8 5-5 8-5-8-8-5 8-5Z" fill="#d9b779" opacity=".70"/>
  <text x="1157" y="430" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="900" fill="#29372c">Gemini API</text>
  <text x="1157" y="458" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800" fill="#6d715d">レビュー文を生成</text>

  <text x="1304" y="390" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".66">▶</text>

  <g filter="url(#cardShadow)">
    <rect x="1344" y="270" width="198" height="224" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
  </g>
  <text x="1372" y="310" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="900" fill="#4f6f52">OUTPUT</text>
  <path d="M1384 336 h118a17 17 0 0 1 17 17v40a17 17 0 0 1-17 17h-66l-26 18 7-18h-33a17 17 0 0 1-17-17v-40a17 17 0 0 1 17-17Z" fill="#edf2df" stroke="#9fb28a" stroke-width="3"/>
  <text x="1443" y="378" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="900" fill="#314b36">PRコメント</text>
  <text x="1443" y="458" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800" fill="#6d715d">結果を投稿</text>
</svg>
