<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">AIレビューコメントが返ってくるまでの流れ</title>
  <desc id="desc">PR作成、GitHub Actions、Python Script、Gemini API、AI Review Commentの順に処理が進む横長のフロー図。</desc>
  <defs>
    <filter id="cardShadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="5" dy="7" stdDeviation="0" flood-color="#314b36" flood-opacity=".07"/>
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#473618" flood-opacity=".09"/>
    </filter>
    <pattern id="grain" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="7" r="1.1" fill="#d7c39f" opacity=".20"/>
      <circle cx="26" cy="17" r="1" fill="#9fb28a" opacity=".14"/>
      <circle cx="15" cy="29" r=".9" fill="#a96d3a" opacity=".12"/>
    </pattern>
  </defs>

  <rect width="1600" height="620" fill="#f4ead8"/>
  <rect width="1600" height="620" fill="url(#grain)" opacity=".72"/>
  <rect x="8" y="8" width="1584" height="604" rx="34" fill="none" stroke="#d7c39f" stroke-width="4"/>
  <circle cx="118" cy="92" r="150" fill="#9fb28a" opacity=".16"/>
  <circle cx="1458" cy="90" r="180" fill="#d9b779" opacity=".20"/>

  <rect x="64" y="52" width="558" height="78" rx="16" fill="#314b36"/>
  <rect x="92" y="36" width="118" height="24" rx="5" fill="#d9b779" opacity=".62" transform="rotate(-6 92 36)"/>
  <text x="96" y="101" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="900" fill="#fff8e9">AIレビューコメントが返ってくるまで</text>
  <text x="66" y="172" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#6d715d">Pull Requestをきっかけに自動処理が動き、Gemini APIがレビュー文を作成します。</text>

