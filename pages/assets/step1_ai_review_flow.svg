    </g>
    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">1</text>
    <text x="78" y="51" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="900" fill="#29372c">PR作成</text>
    <path d="M52 100 h126 a20 20 0 0 1 20 20 v64 a20 20 0 0 1-20 20H52a20 20 0 0 1-20-20v-64a20 20 0 0 1 20-20Z" fill="#edf2df" stroke="#9fb28a" stroke-width="3"/>
    <path d="M73 150 h88 M73 128 h56 M73 172 h76" stroke="#314b36" stroke-width="7" stroke-linecap="round" opacity=".76"/>
    <text x="115" y="235" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">コード変更をPRとして</text>
    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">提出する</text>
  </g>

  <text x="335" y="398" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".70">▶</text>

