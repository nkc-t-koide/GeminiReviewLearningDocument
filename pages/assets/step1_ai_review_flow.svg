    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">2</text>
