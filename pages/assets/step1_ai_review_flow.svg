    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">5</text>
    <text x="78" y="42" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="900" fill="#29372c">AI Review</text>
    <text x="78" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="900" fill="#29372c">Comment</text>
    <path d="M42 105 h146a18 18 0 0 1 18 18v51a18 18 0 0 1-18 18H90l-36 23 10-23H42a18 18 0 0 1-18-18v-51a18 18 0 0 1 18-18Z" fill="#edf2df" stroke="#9fb28a" stroke-width="3"/>
    <path d="M64 139 h102 M64 163 h78" stroke="#314b36" stroke-width="7" stroke-linecap="round" opacity=".76"/>
    <text x="115" y="235" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">PRにレビュー結果を</text>
    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">コメントする</text>
