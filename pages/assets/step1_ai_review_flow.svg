    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">自動処理を起動する</text>
  </g>

  <text x="636" y="398" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".70">▶</text>

  <g transform="translate(672 248)">
    <g filter="url(#cardShadow)">
      <rect width="230" height="282" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
    </g>
    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">3</text>
    <text x="78" y="42" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="900" fill="#29372c">Python</text>
    <text x="78" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="900" fill="#29372c">Script</text>
    <rect x="36" y="102" width="158" height="100" rx="20" fill="#26382b" stroke="#314b36" stroke-width="3"/>
    <text x="58" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700" fill="#fff8e9">diff + rules</text>
    <text x="58" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700" fill="#d9b779">send()</text>
    <text x="115" y="235" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">差分とレビュー条件を</text>
    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">Gemini APIへ送る</text>
  </g>

  <text x="937" y="398" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".70">▶</text>

  <g transform="translate(973 248)">
    <g filter="url(#cardShadow)">
      <rect width="230" height="282" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
