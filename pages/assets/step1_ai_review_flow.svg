    <circle cx="42" cy="42" r="23" fill="#4f6f52"/>
    <text x="42" y="51" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#fff">4</text>
    <text x="78" y="42" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="900" fill="#29372c">Gemini</text>
    <text x="78" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="900" fill="#29372c">API</text>
    <rect x="47" y="104" width="136" height="88" rx="20" fill="#edf2df" stroke="#9fb28a" stroke-width="3"/>
    <rect x="69" y="126" width="92" height="42" rx="12" fill="#314b36"/>
    <text x="115" y="154" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="900" fill="#fff8e9">API</text>
    <path d="M54 121 l7 12 12 7-12 7-7 12-7-12-12-7 12-7Z" fill="#d9b779" opacity=".85"/>
    <path d="M178 169 l5 9 9 5-9 5-5 9-5-9-9-5 9-5Z" fill="#d9b779" opacity=".72"/>
    <text x="115" y="235" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">レビュー文を</text>
    <text x="115" y="260" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#6d715d">生成する</text>
  </g>

  <text x="1238" y="398" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#4f6f52" opacity=".70">▶</text>

  <g transform="translate(1274 248)">
    <g filter="url(#cardShadow)">
      <rect width="230" height="282" rx="24" fill="#fff8e9" stroke="#d7c39f" stroke-width="3"/>
